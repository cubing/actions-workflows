# This action is specifically for the https://github.com/cubing/actions-workflows repo.

name: Publish GitHub release

on:
  push:
    tags:
      - v*

jobs:
  repo-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: ./script/github-actions-repo-guard.ts

  Publish:
    needs: repo-guard
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    uses: cubing/actions-workflows/.github/workflows/publish-github-release.yaml@main
